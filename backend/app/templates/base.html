<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema de Mobilidade Urbana{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-blue-600 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl">Mobilidade Urbana</h1>
            <ul class="flex space-x-4">
                <li><a href="/" class="hover:underline">Home</a></li>
                <li><a href="/motoristas" class="hover:underline">Motoristas</a></li>
                <li><a href="/passageiros" class="hover:underline">Passageiros</a></li>
                <li><a href="/onibus" class="hover:underline">Ônibus</a></li>
                <li><a href="/rotas" class="hover:underline">Rotas</a></li>
                <li><a href="/paradas" class="hover:underline">Paradas</a></li>
                <li><a href="/viagens" class="hover:underline">Viagens</a></li>
                <li><a href="/feedbacks" class="hover:underline">Feedbacks</a></li>
                <li><a href="/embarques" class="hover:underline">Embarques</a></li>
                <li><a href="/itinerarios" class="hover:underline">Itinerários</a></li>
            </ul>
        </div>
    </nav>

    <!-- Conteúdo da página -->
    <main class="container mx-auto flex-1 p-6">
        {% block content %}
        <!-- Cada template específico vai colocar o conteúdo aqui -->
        {% endblock %}
    </main>

    <!-- Rodapé -->
    <footer class="bg-gray-800 text-white text-center p-4">
        © 2026 Sistema de Mobilidade Urbana - UFCA
    </footer>

</body>
</html>
