{% extends "base.html" %}

{% block title %}Passageiros{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-4">Passageiros</h2>

<form action="/passageiros" method="post" class="mb-6 bg-white p-4 rounded shadow">
    <div class="mb-2">
        <label class="block font-semibold">Nome Completo</label>
        <input type="text" name="nome_completo" class="border rounded w-full p-2">
    </div>
    <div class="mb-2">
        <label class="block font-semibold">Perfil de Acessibilidade</label>
        <select name="perfil_acessibilidade" class="border rounded w-full p-2">
            <option value="Nenhum">Nenhum</option>
            <option value="Cadeirante">Cadeirante</option>
            <option value="Muletas">Muletas</option>
            <option value="Visual">Visual</option>
        </select>
    </div>
    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Adicionar Passageiro</button>
</form>

<table class="min-w-full bg-white rounded shadow">
    <thead>
        <tr class="bg-gray-200">
            <th class="py-2 px-4">ID</th>
            <th class="py-2 px-4">Nome Completo</th>
            <th class="py-2 px-4">Perfil de Acessibilidade</th>
        </tr>
    </thead>
    <tbody>
        {% for passageiro in passageiros %}
        <tr class="border-t">
            <td class="py-2 px-4">{{ passageiro.id }}</td>
            <td class="py-2 px-4">{{ passageiro.nome_completo }}</td>
            <td class="py-2 px-4">{{ passageiro.perfil_acessibilidade }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
