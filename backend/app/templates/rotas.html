{% extends "base.html" %}

{% block title %}Ônibus{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-4">Ônibus</h2>

<form action="/onibus" method="post" class="mb-6 bg-white p-4 rounded shadow">
    <div class="mb-2">
        <label class="block font-semibold">Placa</label>
        <input type="text" name="placa" class="border rounded w-full p-2">
    </div>
    <div class="mb-2">
        <label class="block font-semibold">Modelo Acessível</label>
        <select name="modelo_acessivel" class="border rounded w-full p-2">
            <option value="True">Sim</option>
            <option value="False">Não</option>
        </select>
    </div>
    <div class="mb-2">
        <label class="block font-semibold">Capacidade Máxima</label>
        <input type="number" name="capacidade_maxima" class="border rounded w-full p-2">
    </div>
    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Adicionar Ônibus</button>
</form>

<table class="min-w-full bg-white rounded shadow">
    <thead>
        <tr class="bg-gray-200">
            <th>ID</th>
            <th>Placa</th>
            <th>Modelo Acessível</th>
            <th>Capacidade Máxima</th>
        </tr>
    </thead>
    <tbody>
        {% for onibus in onibus_list %}
        <tr class="border-t">
            <td>{{ onibus.id }}</td>
            <td>{{ onibus.placa }}</td>
            <td>{{ onibus.modelo_acessivel }}</td>
            <td>{{ onibus.capacidade_maxima }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
